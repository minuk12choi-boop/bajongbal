<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>관심그룹</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#f3f4f6}.layout{display:flex;min-height:100vh}.sidebar{width:220px;background:#111827;color:#fff;padding:14px}.sidebar a{display:block;color:#d1d5db;padding:10px;border-radius:8px;text-decoration:none;margin-bottom:6px}.sidebar a.active,.sidebar a:hover{background:#374151;color:#fff}.main{flex:1;padding:16px;display:grid;grid-template-columns:320px 1fr;gap:12px}.card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.tbl{width:100%;border-collapse:collapse}.tbl th,.tbl td{padding:8px;border-bottom:1px solid #e5e7eb}.row{display:flex;gap:8px;flex-wrap:wrap}.input,button{padding:8px;border-radius:8px;border:1px solid #d1d5db}.candidate{border:1px solid #d1d5db;border-radius:8px;padding:8px;cursor:pointer}.candidate.sel{border-color:#2563eb;background:#eff6ff}</style></head><body>
<div class="layout"><aside class="sidebar"><h3>BAJONGBAL</h3><a href="/dashboard">대시보드</a><a href="/theme-stocks">테마 종목 리스트</a><a class="active" href="/watchlists">관심그룹</a></aside>
<main class="main"><section class="card"><h3>관심그룹</h3><input class="input" id="groupName" placeholder="그룹명"/><input class="input" id="groupDesc" placeholder="설명"/><div class="row" style="margin-top:8px"><button onclick="createGroup()">생성</button><button onclick="updateGroup()">수정</button><button onclick="deleteGroup()">삭제</button></div><div id="groupList" style="margin-top:10px"></div></section>
<section class="card"><h3 id="itemsTitle">선택 그룹 종목</h3>
<div class="row"><input class="input" id="searchCode" placeholder="종목코드"/><input class="input" id="searchName" placeholder="종목명"/><button onclick="searchCandidates()">검색</button><button id="btnAdd" disabled onclick="addSelected()">선택 종목 추가</button><button onclick="loadItemsWithQuote()">시세 조회</button></div>
<div id="candidateBox" style="margin-top:8px"></div>
<table class="tbl" style="margin-top:8px"><thead><tr><th>코드</th><th>종목명</th><th>시장</th><th>현재가</th><th>상태</th><th>삭제</th></tr></thead><tbody id="itemsRows"></tbody></table>
</section></main></div>
<script>
let groups=[],selectedGroupId=null,items=[],candidates=[],selectedCandidate=null;
function renderGroups(){const el=document.getElementById('groupList');el.innerHTML='';groups.forEach(g=>el.insertAdjacentHTML('beforeend',`<div class='candidate ${selectedGroupId===g.id?'sel':''}' onclick='selectGroup(${g.id})'><b>${g.name}</b><div>${g.description||''}</div></div>`));}
async function loadGroups(){const d=await fetch('/api/watchlists').then(r=>r.json());groups=d.items||[];if(!selectedGroupId&&groups[0])selectedGroupId=groups[0].id;renderGroups();loadItems();}
function selectGroup(id){selectedGroupId=id;renderGroups();loadItems();}
async function createGroup(){await fetch('/api/watchlists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:groupName.value,description:groupDesc.value})});loadGroups();}
async function updateGroup(){if(!selectedGroupId)return;await fetch(`/api/watchlists/${selectedGroupId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:groupName.value,description:groupDesc.value})});loadGroups();}
async function deleteGroup(){if(!selectedGroupId)return;await fetch(`/api/watchlists/${selectedGroupId}`,{method:'DELETE'});selectedGroupId=null;loadGroups();}
async function searchCandidates(){const q=(searchCode.value||searchName.value||'').trim();if(!q)return;const d=await fetch(`/api/stocks/search?q=${encodeURIComponent(q)}`).then(r=>r.json());candidates=d.items||[];selectedCandidate=null;renderCandidates();}
function renderCandidates(){const box=document.getElementById('candidateBox');if(!candidates.length){box.innerHTML='<small>검색 결과 없음</small>';btnAdd.disabled=true;return;}box.innerHTML=candidates.map((c,i)=>`<div class='candidate ${selectedCandidate===i?'sel':''}' onclick='selectCandidate(${i})'>${c.code} / ${c.name||''} / ${c.theme_name||''}</div>`).join('');btnAdd.disabled=(selectedCandidate===null);}
function selectCandidate(i){selectedCandidate=i;renderCandidates();}
async function addSelected(){if(selectedCandidate===null||!selectedGroupId)return;const c=candidates[selectedCandidate];if(!/^\d{6}$/.test(c.code)||!c.name){alert('유효한 종목코드+종목명 후보를 선택하세요.');return;}const out=await fetch(`/api/watchlists/${selectedGroupId}/items`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:c.code,name:c.name,market:c.market,theme_names:c.theme_name})}).then(r=>r.json());if(out.ok===false)alert(out.error||'추가 실패');loadItems();}
async function loadItems(){if(!selectedGroupId)return;const d=await fetch(`/api/watchlists/${selectedGroupId}/items`).then(r=>r.json());items=d.items||[];renderItems();}
async function loadItemsWithQuote(){if(!selectedGroupId)return;const d=await fetch(`/api/watchlists/${selectedGroupId}/quotes`).then(r=>r.json());items=d.items||[];renderItems();}
async function removeItem(id){await fetch(`/api/watchlists/${selectedGroupId}/items/${id}`,{method:'DELETE'});loadItems();}
function renderItems(){items=items||[];items.sort((a,b)=>String(a.code).localeCompare(String(b.code)));itemsTitle.textContent=`${(groups.find(g=>g.id===selectedGroupId)||{}).name||''} 종목`;itemsRows.innerHTML=items.map(r=>`<tr><td>${r.code||''}</td><td>${r.name||''}</td><td>${r.market||'확인 필요'}</td><td>${r.price||'-'}</td><td title='${r.failure_reason||''}'>${r.kis_status||'NO_DATA'}</td><td><button onclick='removeItem(${r.id})'>삭제</button></td></tr>`).join('');}
loadGroups();
</script></body></html>
