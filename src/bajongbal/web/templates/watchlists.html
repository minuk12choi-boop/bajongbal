<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>관심그룹</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#f3f4f6;overflow-x:hidden}.layout{display:flex;min-height:100vh}.sidebar{width:220px;background:#111827;color:#fff;padding:14px}.sidebar a{display:block;color:#d1d5db;padding:10px;border-radius:8px;text-decoration:none;margin-bottom:6px}.sidebar a.active,.sidebar a:hover{background:#374151;color:#fff}.main{flex:1;padding:16px;display:grid;grid-template-columns:300px 1fr;gap:12px}.card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.group{padding:10px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;cursor:pointer}.group.active{background:#dbeafe;border-color:#93c5fd}.tbl{width:100%;border-collapse:collapse}.tbl th,.tbl td{padding:8px;border-bottom:1px solid #e5e7eb;white-space:nowrap}.tbl tr:hover{background:#f9fafb}.table-wrap{overflow:auto}.input,button{padding:8px;border-radius:8px;border:1px solid #d1d5db}button.primary{background:#1d4ed8;color:#fff;border:0}button.danger{background:#dc2626;color:#fff;border:0}.fail{background:#f3f4f6;color:#6b7280}@media(max-width:1100px){.layout{display:block}.sidebar{width:auto}.main{grid-template-columns:1fr}}</style></head><body><div class="layout"><aside class="sidebar"><h3>BAJONGBAL</h3><a href="/dashboard">대시보드</a><a href="/theme-stocks">테마 종목 리스트</a><a class="active" href="/watchlists">관심그룹</a></aside>
<main class="main"><section class="card"><h3>관심그룹</h3><input class="input" id="groupName" placeholder="그룹명"/><input class="input" id="groupDesc" placeholder="설명"/><div style="margin-top:8px"><button class="primary" onclick="createGroup()">생성</button> <button onclick="updateGroup()">수정</button> <button class="danger" onclick="deleteGroup()">삭제</button></div><div id="groupList" style="margin-top:12px"></div></section>
<section class="card"><h3 id="itemsTitle">선택 그룹 종목</h3><div><input class="input" id="code" placeholder="종목코드"/><input class="input" id="name" placeholder="종목명"/><button class="primary" onclick="addItem()">추가</button><button onclick="loadItemsWithQuote()">시세 조회</button></div><div class="table-wrap" style="margin-top:8px"><table class="tbl"><thead><tr><th>관심</th><th>종목코드</th><th>종목명</th><th>테마</th><th>현재가</th><th>등락률</th><th>거래량</th><th>거래대금(만원)</th><th>시가총액(만원)</th><th>추가시각</th><th>KIS 조회상태</th><th>삭제</th></tr></thead><tbody id="itemsRows"></tbody></table></div><details><summary>상세 JSON 보기</summary><pre id="itemsJson"></pre></details></section></main></div>
<script>
let groups=[];let selectedGroupId=null;let items=[];
const normalizeSearchText=t=>(t||'').toLowerCase().replace(/\s+/g,'');
function failRank(r){const m={OK:0,INVALID_CODE:1,NO_DATA:2,PARSE_FAILED:3,API_FAILED:4,RATE_LIMITED:5};return m[r.kis_status]??9}
function renderGroups(){const root=document.getElementById('groupList');root.innerHTML='';groups.forEach(g=>{const c=(selectedGroupId===g.id)?'group active':'group';root.insertAdjacentHTML('beforeend',`<div class='${c}' onclick='selectGroup(${g.id})'><b>${g.name}</b><div>${g.description||''}</div><small>생성 ${g.created_at||''} / 수정 ${g.updated_at||''}</small></div>`)});}
async function loadGroups(){const d=await fetch('/api/watchlists').then(r=>r.json());groups=d.items||[];if(!selectedGroupId&&groups.length)selectedGroupId=groups[0].id;renderGroups();loadItems();}
function selectGroup(id){selectedGroupId=id;renderGroups();loadItems();}
async function createGroup(){await fetch('/api/watchlists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('groupName').value,description:document.getElementById('groupDesc').value})});loadGroups();}
async function updateGroup(){if(!selectedGroupId)return;await fetch(`/api/watchlists/${selectedGroupId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('groupName').value,description:document.getElementById('groupDesc').value})});loadGroups();}
async function deleteGroup(){if(!selectedGroupId||!confirm('삭제하시겠습니까?'))return;await fetch(`/api/watchlists/${selectedGroupId}`,{method:'DELETE'});selectedGroupId=null;loadGroups();}
async function addItem(){if(!selectedGroupId)return;await fetch(`/api/watchlists/${selectedGroupId}/items`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:document.getElementById('code').value,name:document.getElementById('name').value})});loadItems();}
async function removeItem(id){if(!confirm('종목을 삭제하시겠습니까?'))return;await fetch(`/api/watchlists/${selectedGroupId}/items/${id}`,{method:'DELETE'});loadItems();}
async function loadItems(){if(!selectedGroupId)return;const d=await fetch(`/api/watchlists/${selectedGroupId}/items`).then(r=>r.json());items=(d.items||[]).map(x=>({...x,price:'-',change_rate:'-',volume:'-',trading_value:'-',market_cap:'계산 불가',kis_status:'NO_DATA'}));renderItems();document.getElementById('itemsJson').textContent=JSON.stringify(d.items||[],null,2);const g=groups.find(x=>x.id===selectedGroupId);document.getElementById('itemsTitle').textContent=`${g?g.name:''} 종목`}
async function loadItemsWithQuote(){if(!selectedGroupId)return;await loadItems();for(const it of items){const q=await fetch(`/api/theme-stocks?code=${it.code}&max_symbols=1`).then(r=>r.json());const row=(q.items||[])[0];if(row){Object.assign(it,{price:row.price,change_rate:row.change_rate,volume:row.volume,trading_value:row.trading_value,market_cap:row.market_cap,kis_status:row.kis_status,theme:row.theme_name});}}renderItems();}
function renderItems(){const tb=document.getElementById('itemsRows');tb.innerHTML='';const sorted=[...items].sort((a,b)=>failRank(a)-failRank(b)||normalizeSearchText(a.name).localeCompare(normalizeSearchText(b.name)));sorted.forEach(r=>tb.insertAdjacentHTML('beforeend',`<tr class='${r.kis_status==='OK'?'':'fail'}'><td>★</td><td>${r.code||''}</td><td>${r.name||''}</td><td>${r.theme_names||r.theme||''}</td><td>${r.price}</td><td>${r.change_rate}</td><td>${r.volume}</td><td>${r.trading_value}</td><td>${r.market_cap}</td><td>${r.added_at||''}</td><td>${r.kis_status}</td><td><button onclick='removeItem(${r.id})'>삭제</button></td></tr>`));}
loadGroups();
</script></body></html>
