<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>관심그룹</title><style>body{font-family:sans-serif;margin:0;display:flex}.sidebar{width:220px;background:#111827;color:#fff;min-height:100vh;padding:12px}.sidebar a{display:block;color:#fff;padding:8px;border-radius:6px;text-decoration:none}.sidebar a.active{background:#374151}.content{flex:1;padding:16px}.section{border:1px solid #ddd;padding:12px;margin-bottom:12px;border-radius:8px}</style></head><body>
<div class="sidebar"><h3>BAJONGBAL</h3><a href="/dashboard">대시보드</a><a href="/theme-stocks">테마 종목 리스트</a><a class="active" href="/watchlists">관심그룹</a></div>
<div class="content"><div class="section"><h2>관심그룹 관리</h2><input id="groupName" placeholder="그룹명"/><input id="groupDesc" placeholder="설명"/><button onclick="createGroup()">생성</button><button onclick="updateGroup()">수정</button><button onclick="deleteGroup()">삭제</button><select id="groups" onchange="loadItems()"></select></div><div class="section"><h3>종목</h3><input id="code" placeholder="코드"/><input id="name" placeholder="종목명"/><button onclick="addItem()">추가</button><pre id="items"></pre></div>
<script>
async function loadGroups(){const d=await fetch('/api/watchlists').then(r=>r.json());const s=document.getElementById('groups');s.innerHTML='';(d.items||[]).forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;s.appendChild(o)});if((d.items||[]).length===0)s.innerHTML='<option value="">그룹 없음</option>';loadItems();}
async function loadItems(){const gid=document.getElementById('groups').value;if(!gid)return;const d=await fetch(`/api/watchlists/${gid}/items`).then(r=>r.json());document.getElementById('items').textContent=JSON.stringify(d.items,null,2)}
async function createGroup(){await fetch('/api/watchlists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('groupName').value,description:document.getElementById('groupDesc').value})});loadGroups()}
async function updateGroup(){const gid=document.getElementById('groups').value;await fetch(`/api/watchlists/${gid}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('groupName').value,description:document.getElementById('groupDesc').value})});loadGroups()}
async function deleteGroup(){const gid=document.getElementById('groups').value;await fetch(`/api/watchlists/${gid}`,{method:'DELETE'});loadGroups()}
async function addItem(){const gid=document.getElementById('groups').value;await fetch(`/api/watchlists/${gid}/items`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:document.getElementById('code').value,name:document.getElementById('name').value})});loadItems()}
loadGroups();
</script></div></body></html>
