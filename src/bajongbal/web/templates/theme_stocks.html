<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>테마 종목 리스트</title><style>body{font-family:sans-serif;margin:0;display:flex}.sidebar{width:220px;background:#111827;color:#fff;min-height:100vh;padding:12px}.sidebar a{display:block;color:#fff;padding:8px;border-radius:6px;text-decoration:none}.sidebar a.active{background:#374151}.content{flex:1;padding:16px}.section{border:1px solid #ddd;padding:12px;margin-bottom:12px;border-radius:8px}.star{cursor:pointer}#loadingOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}#loadingBox{background:#fff;padding:20px;border-radius:8px}</style></head><body>
<div class="sidebar"><h3>BAJONGBAL</h3><a href="/dashboard">대시보드</a><a class="active" href="/theme-stocks">테마 종목 리스트</a><a href="/watchlists">관심그룹</a></div>
<div class="content"><div id="loadingOverlay"><div id="loadingBox"><div id="loadingMessage">로딩 중...</div></div></div>
<div class="section"><h2>테마 종목 리스트</h2><select id="themeFilter"><option value="">전체 테마</option></select><input id="codeFilter" placeholder="종목코드"/><input id="nameFilter" placeholder="종목명"/><input id="maxSymbols" type="number" value="100"/><button id="btnLoadThemeStocks" onclick="loadThemeStocks()">조회</button><button onclick="resetSorts()">정렬 초기화</button><div id="sortInfo"></div></div>
<div class="section"><table border="1" cellpadding="4"><thead><tr><th>관심</th><th onclick="toggleSort('theme_name')">테마명</th><th onclick="toggleSort('code')">종목코드</th><th onclick="toggleSort('name')">종목명</th><th onclick="toggleSort('price')">현재가</th><th onclick="toggleSort('change_rate')">등락률</th><th onclick="toggleSort('volume')">거래량</th><th onclick="toggleSort('trading_value')">거래대금</th><th onclick="toggleSort('market_cap')">시가총액</th><th>시장구분</th><th>마지막 시세 조회 시각</th><th>KIS 조회 상태</th></tr></thead><tbody id="rows"></tbody></table><pre id="diag"></pre></div>
<div id="starModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);padding:60px"><div style="max-width:480px;margin:0 auto;background:#fff;padding:16px;border-radius:8px"><h3>관심그룹 추가</h3><div id="starTarget"></div><select id="starGroup"></select><input id="newGroupName" placeholder="새 그룹명"/><button onclick="createGroupInModal()">그룹 생성</button><button onclick="addStarToGroup()">추가</button><button onclick="closeStarModal()">닫기</button></div></div>
<script>
let themeRows=[];let sortPriority=[];let starCode='',starName='',starEl=null;
function showLoading(m){document.getElementById('loadingMessage').textContent=m;document.getElementById('loadingOverlay').style.display='flex'}function hideLoading(){document.getElementById('loadingOverlay').style.display='none'}
async function runWithLoading(msg,task){showLoading(msg);try{return await task();}finally{hideLoading();}}
async function apiFetchWithLoading(url,opt,msg){return runWithLoading(msg,async()=>{const r=await fetch(url,opt);if(!r.ok)throw new Error('요청 실패');return await r.json();});}
async function loadThemeList(){const d=await fetch('/api/themes/list').then(r=>r.json());const s=document.getElementById('themeFilter');s.innerHTML='<option value="">전체 테마</option>';(d.items||[]).forEach(t=>{const o=document.createElement('option');o.value=t.theme_id;o.textContent=`${t.theme_name} (${t.stock_count})`;o.dataset.themeName=t.theme_name;s.appendChild(o);});}
async function loadWatchlists(){const d=await fetch('/api/watchlists').then(r=>r.json());const s=document.getElementById('starGroup');s.innerHTML='';(d.items||[]).forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;s.appendChild(o);});if((d.items||[]).length===0)s.innerHTML='<option value="">그룹 없음</option>';}
async function loadThemeStocks(){const sel=document.getElementById('themeFilter');const opt=sel.options[sel.selectedIndex];const q=new URLSearchParams({theme_id:sel.value,theme_name:opt?.dataset.themeName||'',code:document.getElementById('codeFilter').value,name:document.getElementById('nameFilter').value,max_symbols:document.getElementById('maxSymbols').value});const d=await apiFetchWithLoading(`/api/theme-stocks?${q.toString()}`,{},'테마 종목 리스트를 불러오는 중입니다.');themeRows=d.items||[];applySort();document.getElementById('diag').textContent=JSON.stringify({diagnostics:d.diagnostics,warnings:d.warnings,errors:d.errors},null,2);}
function toggleSort(col){const i=sortPriority.findIndex(x=>x.col===col);if(i<0)sortPriority.push({col,dir:'desc'});else if(sortPriority[i].dir==='desc')sortPriority[i].dir='asc';else sortPriority.splice(i,1);applySort();}
function resetSorts(){sortPriority=[];applySort();}
function applySort(){const arr=[...themeRows];arr.sort((a,b)=>{for(const s of sortPriority){const av=a[s.col],bv=b[s.col];const na=Number(av),nb=Number(bv);const cmp=(!isNaN(na)&&!isNaN(nb))?(na-nb):String(av).localeCompare(String(bv));if(cmp!==0)return s.dir==='asc'?cmp:-cmp;}return 0;});render(arr);document.getElementById('sortInfo').textContent=sortPriority.map((s,i)=>`${s.col} ${s.dir==='asc'?'↑':'↓'} ${i+1}순위`).join(' / ')||'정렬 없음';}
function render(rows){const tb=document.getElementById('rows');tb.innerHTML='';rows.forEach(r=>tb.insertAdjacentHTML('beforeend',`<tr><td><span class='star' onclick="openStarModal('${r.code}','${r.name}',this)">☆</span></td><td>${r.theme_name}</td><td>${r.code}</td><td>${r.name}</td><td>${r.price}</td><td>${r.change_rate}</td><td>${r.volume}</td><td>${r.trading_value}</td><td>${r.market_cap}</td><td>${r.market}</td><td>${r.fetched_at}</td><td>${r.kis_status}</td></tr>`));}
function openStarModal(code,name,el){starCode=code;starName=name;starEl=el;document.getElementById('starTarget').textContent=`${name}(${code})`;document.getElementById('starModal').style.display='block';}
function closeStarModal(){document.getElementById('starModal').style.display='none';}
async function createGroupInModal(){const n=document.getElementById('newGroupName').value.trim();if(!n)return;await apiFetchWithLoading('/api/watchlists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})},'관심종목 그룹을 생성 중입니다.');await loadWatchlists();}
async function addStarToGroup(){const gid=document.getElementById('starGroup').value;const ex=await fetch(`/api/watchlists/membership?code=${starCode}`).then(r=>r.json());if((ex.items||[]).some(x=>String(x.group_id)===String(gid))){alert('이미 이 그룹에 추가되어 있습니다.');return;}await apiFetchWithLoading(`/api/watchlists/${gid}/items`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:starCode,name:starName})},'관심종목을 추가 중입니다.');if(starEl)starEl.textContent='★';closeStarModal();}
loadThemeList();loadWatchlists();
</script></div></body></html>
