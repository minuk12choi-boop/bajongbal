<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>테마 종목 리스트</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#f3f4f6;overflow-x:hidden}.layout{display:flex;min-height:100vh}.sidebar{width:220px;background:#111827;color:#fff;padding:14px}.sidebar a{display:block;color:#d1d5db;padding:10px;border-radius:8px;text-decoration:none;margin-bottom:6px}.sidebar a.active,.sidebar a:hover{background:#374151;color:#fff}.main{flex:1;padding:16px;display:grid;gap:12px}.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}.input,select,button{padding:8px;border-radius:8px;border:1px solid #d1d5db}.table-wrap{overflow:auto}.tbl{width:100%;border-collapse:collapse}.tbl th,.tbl td{padding:8px;border-bottom:1px solid #e5e7eb;white-space:nowrap}.tbl th{position:sticky;top:0;background:#f9fafb;cursor:pointer}.tbl tr:hover{background:#f3f4f6}.tbl tr.fail{background:#f3f4f6;color:#6b7280}.sort{font-size:12px;color:#6b7280}#loadingOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.35)}#loadingBox{background:#fff;padding:18px;border-radius:10px}.chip{background:#eef2ff;padding:3px 8px;border-radius:999px;font-size:12px}@media(max-width:1100px){.layout{display:block}.sidebar{width:auto}}</style></head><body>
<div class="layout"><aside class="sidebar"><h3>BAJONGBAL</h3><a href="/dashboard">대시보드</a><a class="active" href="/theme-stocks">테마 종목 리스트</a><a href="/watchlists">관심그룹</a></aside><main class="main">
<div id="loadingOverlay"><div id="loadingBox"><div id="loadingMessage">로딩 중...</div></div></div>
<section class="card"><h2>테마 종목 리스트</h2><div class="controls"><label>테마<select id="themeFilter"><option value="">전체 테마</option></select></label><label>테마명 포함<input class="input" id="themeNameFilter"/></label><label>종목코드 포함<input class="input" id="codeFilter"/></label><label>종목명 포함<input class="input" id="nameFilter"/></label><label>시장<input class="input" id="marketFilter"/></label><label>KIS상태<select id="statusFilter"><option value="">전체</option><option>OK</option><option>INVALID_CODE</option><option>API_FAILED</option><option>PARSE_FAILED</option></select></label><label>최대 조회<input class="input" id="maxSymbols" type="number" value="100"/></label></div><div style="margin-top:8px"><button id="btnLoadThemeStocks" onclick="loadThemeStocks()">조회</button> <button onclick="resetSorts()">정렬 초기화</button> <span id="sortInfo" class="sort"></span></div></section>
<section class="card"><div class="table-wrap"><table class="tbl"><thead><tr><th>관심</th><th onclick="toggleSort('theme_name')">테마명 <span id="s-theme_name" class="sort">↕</span></th><th onclick="toggleSort('code')">종목코드 <span id="s-code" class="sort">↕</span></th><th onclick="toggleSort('name')">종목명 <span id="s-name" class="sort">↕</span></th><th onclick="toggleSort('price')">현재가 <span id="s-price" class="sort">↕</span></th><th onclick="toggleSort('change_rate')">등락률 <span id="s-change_rate" class="sort">↕</span></th><th onclick="toggleSort('volume')">거래량 <span id="s-volume" class="sort">↕</span></th><th onclick="toggleSort('trading_value')">거래대금 <span id="s-trading_value" class="sort">↕</span></th><th onclick="toggleSort('market_cap')">시가총액 <span id="s-market_cap" class="sort">↕</span></th><th>시장구분</th><th>마지막 시세 조회 시각</th><th onclick="toggleSort('kis_status')">KIS 조회 상태 <span id="s-kis_status" class="sort">↕</span></th><th>실패 사유</th></tr></thead><tbody id="rows"></tbody></table></div><div id="diagSummary"></div><details><summary>상세 JSON 보기</summary><pre id="diag"></pre></details></section>
</main></div>
<script>
const normalizeSearchText=t=>(t||'').toLowerCase().replace(/\s+/g,'');
let rowsData=[]; let sortPriority=[];
function showLoading(m){document.getElementById('loadingMessage').textContent=m;document.getElementById('loadingOverlay').style.display='flex'}function hideLoading(){document.getElementById('loadingOverlay').style.display='none'}
async function runWithLoading(msg,task){showLoading(msg);try{return await task();}finally{hideLoading()}}
async function apiFetchWithLoading(url,opt,msg){return runWithLoading(msg,async()=>{const r=await fetch(url,opt);if(!r.ok)throw new Error('요청 실패');return await r.json();});}
async function loadThemeList(){const d=await fetch('/api/themes/list').then(r=>r.json());const s=document.getElementById('themeFilter');s.innerHTML='<option value="">전체 테마</option>';(d.items||[]).forEach(t=>{const o=document.createElement('option');o.value=t.theme_id;o.textContent=`${t.theme_name} (${t.stock_count})`;o.dataset.themeName=t.theme_name;s.appendChild(o);});}
function isFailRow(r){return String(r.kis_status||'')!=='OK';}
function failRank(r){const m={OK:0,INVALID_CODE:1,NO_DATA:2,PARSE_FAILED:3,API_FAILED:4,RATE_LIMITED:5};return m[r.kis_status]??9}
function numVal(v){const n=Number(v);return isNaN(n)?null:n}
function toggleSort(col){const i=sortPriority.findIndex(x=>x.col===col);if(i<0)sortPriority.push({col,dir:'desc'});else if(sortPriority[i].dir==='desc')sortPriority[i].dir='asc';else sortPriority.splice(i,1);applySort()}
function resetSorts(){sortPriority=[];applySort()}
function updateSortIcons(){['theme_name','code','name','price','change_rate','volume','trading_value','market_cap','kis_status'].forEach(c=>{const el=document.getElementById(`s-${c}`);const i=sortPriority.findIndex(x=>x.col===c);if(i<0)el.textContent='↕';else el.textContent=(sortPriority[i].dir==='asc'?'▲':'▼')+String(i+1).replace('1','①').replace('2','②').replace('3','③')});document.getElementById('sortInfo').textContent=sortPriority.map((s,i)=>`${s.col} ${s.dir==='asc'?'▲':'▼'}${i+1}`).join(' / ')||'정렬 없음';}
function applySort(){const data=[...rowsData];data.sort((a,b)=>{const fr=failRank(a)-failRank(b);if(fr!==0)return fr;for(const s of sortPriority){let av=a[s.col],bv=b[s.col];const an=numVal(av),bn=numVal(bv);let cmp=0;if(an!==null&&bn!==null)cmp=an-bn;else cmp=String(av).localeCompare(String(bv));if(cmp!==0)return s.dir==='asc'?cmp:-cmp;}return String(a.name).localeCompare(String(b.name))||String(a.code).localeCompare(String(b.code));});renderRows(data);updateSortIcons()}
function renderRows(data){const tb=document.getElementById('rows');tb.innerHTML='';data.forEach(r=>tb.insertAdjacentHTML('beforeend',`<tr class='${isFailRow(r)?'fail':''}'><td>${r.star||'☆'}</td><td>${r.theme_name||''}</td><td>${r.code||''}</td><td>${r.name||''}</td><td>${r.price}</td><td>${r.change_rate}</td><td>${r.volume}</td><td>${r.trading_value}</td><td>${r.market_cap}</td><td>${r.market||''}</td><td>${r.fetched_at||''}</td><td>${r.kis_status||''}</td><td>${r.failure_reason||'-'}</td></tr>`));}
async function loadThemeStocks(){const sel=document.getElementById('themeFilter');const opt=sel.options[sel.selectedIndex];const q=new URLSearchParams({theme_id:sel.value,theme_name:document.getElementById('themeNameFilter').value||opt?.dataset.themeName||'',code:document.getElementById('codeFilter').value,name:document.getElementById('nameFilter').value,market:document.getElementById('marketFilter').value,status:document.getElementById('statusFilter').value,max_symbols:document.getElementById('maxSymbols').value});const d=await apiFetchWithLoading(`/api/theme-stocks?${q.toString()}`,{},'테마 종목을 조회 중입니다.');rowsData=(d.items||[]).filter(x=>normalizeSearchText(x.theme_name).includes(normalizeSearchText(document.getElementById('themeNameFilter').value||''))&&normalizeSearchText(x.name).includes(normalizeSearchText(document.getElementById('nameFilter').value||''))&&normalizeSearchText(x.code).includes(normalizeSearchText(document.getElementById('codeFilter').value||'')));applySort();const fail=(rowsData||[]).filter(isFailRow).length;document.getElementById('diagSummary').innerHTML=`<span class='chip'>성공 ${rowsData.length-fail}건</span> <span class='chip'>실패 ${fail}건</span>`;document.getElementById('diag').textContent=JSON.stringify(d,null,2)}
loadThemeList();
</script></body></html>
